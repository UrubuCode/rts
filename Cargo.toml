[package]
name = "rts"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0"
object = { version = "0.39", default-features = false, features = ["write", "std", "coff", "elf", "macho", "pe"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
ureq = { version = "2.12", default-features = true }
cranelift-codegen = "0.124"
cranelift-frontend = "0.124"
cranelift-jit = "0.124"
cranelift-module = "0.124"
cranelift-native = "0.124"
rayon = "1.10"
sha2 = "0.10"
