name: Build Artifacts

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install FLTK system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxext-dev libxft-dev libxinerama-dev \
            libxcursor-dev libxrender-dev libxfixes-dev libpango1.0-dev libgl1-mesa-dev \
            libglu1-mesa-dev libfontconfig1-dev libcairo2-dev

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Setup MSVC env (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Smoke test — rts run (JIT)
        run: target/release/rts run bench/pi_machin.ts
        shell: bash

      #- name: Smoke test — rts compile (AOT)
      #  run: |
      #    if [ "$RUNNER_OS" = "Windows" ]; then
      #      RTS=target/release/rts.exe
      #      OUT=smoke_pi.exe
      #    else
      #      RTS=target/release/rts
      #      OUT=smoke_pi
      #    fi
      #    $RTS compile bench/pi_machin.ts smoke_pi
      #    ./$OUT
      #  shell: bash

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: rts-${{ runner.os }}-${{ runner.arch }}
          path: target/release/rts.exe
          if-no-files-found: error

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: rts-${{ runner.os }}-${{ runner.arch }}
          path: target/release/rts
          if-no-files-found: error
