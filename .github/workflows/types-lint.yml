name: rts.d.ts lint

# Garante que `builtin/rts-types/rts.d.ts` no repo esta em sincronia com o
# que `rts emit-types` geraria a partir dos namespaces registrados. Se alguem
# adicionar uma NamespaceMember em Rust mas esquecer de regenerar o .d.ts,
# este job falha.

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  rts-dts-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build rts release
        run: cargo build --release

      - name: Regenerate rts.d.ts into tmp dir
        run: |
          mkdir -p .tmp-types-check
          ./target/release/rts emit-types .tmp-types-check

      - name: Diff generated vs committed
        run: |
          if ! diff -u builtin/rts-types/rts.d.ts .tmp-types-check/rts.d.ts; then
            echo "::error::builtin/rts-types/rts.d.ts is out of sync with namespace SPECs."
            echo "::error::Run 'cargo run --release -- emit-types' and commit the updated rts.d.ts."
            exit 1
          fi
          echo "rts.d.ts is in sync."
